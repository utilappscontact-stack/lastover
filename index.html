<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Last Over</title>
<style>
/* ══ DESIGN TOKENS — Night Cricket Theme ══ */
:root{
  --bg:#0e1117;--bg2:#161c28;--bg3:#1e2538;
  --text:#f0f2f8;--text2:#8a93ae;--text3:#4a5270;
  --border:#252e48;--border2:#354060;
  --green:#1fc87a;--red:#e84545;--amber:#f5a820;--blue:#3d8ef0;
  --gold:#f0b840;--purple:#a78bfa;
  --green-bg:rgba(31,200,122,.12);--red-bg:rgba(232,69,69,.12);
  --amber-bg:rgba(245,168,32,.12);--blue-bg:rgba(61,142,240,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;justify-content:center;padding:12px 0 52px;
}
#g{width:100%;max-width:420px;padding:14px;}

/* ── HUD SCOREBOARD ── */
.sbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;background:var(--bg2);
  border:1.5px solid var(--border2);border-radius:14px;margin-bottom:10px;
}
.sn{font-size:38px;font-weight:900;line-height:1;letter-spacing:-.03em;}
.sl{font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);margin-bottom:4px;}

/* ── WICKET DOTS ── */
.wr{display:flex;gap:5px;justify-content:flex-end;margin-bottom:5px;}
.wd{width:11px;height:11px;border-radius:50%;}
.wd-on{background:var(--green);box-shadow:0 0 5px rgba(31,200,122,.5);}
.wd-off{background:var(--border2);}

/* ── BALL TRACK ── */
.btrack{display:flex;gap:6px;margin-bottom:10px;}
.bd{
  flex:1;aspect-ratio:1;border-radius:50%;
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
}
.bd-e{color:var(--text3);border-color:var(--border);}
.bd-W{background:var(--red-bg);color:#f08080;border-color:var(--red);}
.bd-0{background:var(--bg2);color:var(--text3);}
.bd-1{background:var(--blue-bg);color:#93c5fd;border-color:var(--blue);}
.bd-2{background:rgba(52,211,153,.1);color:#6ee7b7;border-color:#10b981;}
.bd-4{background:var(--amber-bg);color:#fcd34d;border-color:var(--amber);}
.bd-6{background:var(--green-bg);color:#4ade80;border-color:var(--green);}

/* ── DELIVERY BANNER ── */
.del-banner{
  border-left:4px solid;border-radius:0 12px 12px 0;
  padding:10px 14px;margin-bottom:10px;
  background:var(--bg2);
  border-top:1px solid var(--border);
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.del-t{font-size:15px;font-weight:800;margin-bottom:3px;}
.del-h{font-size:11px;color:var(--text2);}

/* ── FIELD LAYOUT ── */
.field-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;}
.t-bar-wrap{width:34px;flex-shrink:0;}
.t-bar{position:relative;border-radius:12px;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);}
.tz{width:100%;}
.tz-r{background:#e84545;}.tz-y{background:#f5a820;}.tz-g{background:#1fc87a;}
.t-cursor{
  position:absolute;left:0;right:0;height:7px;background:#fff;
  border-radius:4px;top:85%;
  box-shadow:0 0 10px rgba(255,255,255,.7);
  transition:none;
}
.t-label{font-size:8px;color:var(--text3);text-align:center;margin-top:5px;line-height:1.4;}
.field-col{flex:1;min-width:0;position:relative;}
.fwrap{position:relative;width:100%;border-radius:10px;overflow:hidden;}

/* ── CRICKET BALL ── */
#fball{
  position:absolute;width:13px;height:13px;
  border-radius:50%;background:#e84545;
  border:2px solid #ff6b6b;
  box-shadow:0 0 8px rgba(232,69,69,.75);
  transform:translate(-50%,-50%);z-index:10;
  pointer-events:none;transition:none;
}

/* ── SHOT INFO PANEL ── */
.shot-info{width:28px;flex-shrink:0;text-align:center;padding-top:65px;}
.si-icon{font-size:20px;margin-bottom:4px;}.si-n{font-size:8px;font-weight:700;color:var(--text2);}

/* ── BOWL CTA ── */
.hit-btn{
  display:block;width:100%;padding:18px;
  font-size:19px;font-weight:900;letter-spacing:.08em;
  background:var(--green);color:#001a0c;
  border:none;border-radius:14px;cursor:pointer;margin-bottom:10px;
  box-shadow:0 4px 24px rgba(31,200,122,.35);
  -webkit-tap-highlight-color:transparent;transition:transform .1s,box-shadow .1s;
}
.hit-btn:active{transform:scale(.96);box-shadow:none;}

/* ── TIMING TAGS ── */
.timing-tag{
  display:inline-block;font-size:11px;padding:4px 10px;
  border-radius:10px;margin:3px 2px 0;font-weight:600;
  border:1px solid transparent;
}

/* ── PLAYER STRIP ── */
.cstrip{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.cc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.cc-r{font-size:9px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.cc-n{font-size:14px;font-weight:700;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cdots{display:flex;gap:4px;align-items:center;}
.cd{width:8px;height:8px;border-radius:50%;}
.cd-on{background:var(--text);}
.cd-off{background:var(--border2);}
.cd-l{font-size:9px;color:var(--text3);margin-left:4px;font-weight:600;}

/* ── SHOT / DELIVERY CARDS ── */
.shots{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.shot{
  border:2px solid;border-radius:12px;
  padding:14px 6px 12px;cursor:pointer;text-align:center;
  background:var(--bg2);transition:transform .12s,box-shadow .12s;
}
.shot:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3);}
.shot:active{transform:scale(.95);}
.shot.disabled{opacity:.25;cursor:not-allowed;transform:none;pointer-events:none;}
.sd{font-size:13px;font-weight:800;margin-bottom:3px;}
.sn2{font-size:11px;margin-bottom:4px;}
.sdesc{font-size:9px;color:var(--text2);line-height:1.35;}

/* ── FIELD TOGGLE ── */
.ft-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.ft{
  border:1.5px solid var(--border2);border-radius:10px;
  padding:11px 6px;cursor:pointer;text-align:center;
  font-size:13px;font-weight:700;
  background:transparent;color:var(--text2);
  transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.ft.active{background:var(--text);color:var(--bg);border-color:var(--text);}

/* ── BALL RESULT AREA ── */
.res-a{text-align:center;padding:4px 0 8px;}
.res-big{font-size:62px;font-weight:900;line-height:1;letter-spacing:-.04em;}
.res-comm{font-size:13px;color:var(--text2);margin-top:8px;line-height:1.6;max-width:270px;margin-left:auto;margin-right:auto;}
.res-result-card{border-radius:14px;padding:18px 14px 14px;text-align:center;margin-bottom:10px;border:1.5px solid;}

/* ── HOME MODE CARDS ── */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0;}
.mc{
  border:1.5px solid var(--border2);border-radius:16px;
  padding:20px 14px;cursor:pointer;text-align:center;
  background:var(--bg2);
  transition:transform .12s,border-color .15s,background .12s;
}
.mc:hover{transform:translateY(-3px);border-color:var(--border2);background:var(--bg3);}
.mc:active{transform:scale(.97);}
.mc-i{font-size:36px;margin-bottom:10px;}
.mc-n{font-size:18px;font-weight:800;margin-bottom:5px;}
.mc-d{font-size:12px;color:var(--text2);line-height:1.5;}

/* ── SCENARIO CARD ── */
.sc-card{
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:14px;padding:16px;margin-bottom:14px;
}

/* ── GENERIC BUTTONS ── */
.btn{
  display:block;width:100%;padding:14px;
  font-size:14px;font-weight:600;
  border:1.5px solid var(--border2);border-radius:10px;
  background:transparent;color:var(--text);
  cursor:pointer;margin-bottom:8px;text-align:center;
  transition:background .12s,border-color .12s;
  -webkit-tap-highlight-color:transparent;
}
.btn:hover{background:var(--bg2);}
.btnP{background:var(--text);color:var(--bg);border-color:var(--text);font-weight:700;}
.btnP:hover{opacity:.9;}

/* ── STATS TABLE ── */
.st{
  display:flex;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;
}
.st:last-child{border:none;}

/* ── NEW BATSMAN ── */
.new-bat-card{
  background:var(--bg2);border:1.5px solid var(--border2);
  border-radius:14px;padding:18px;text-align:center;margin-bottom:10px;
}

/* ── MATCH HEADER ── */
.match-hdr{
  text-align:center;font-size:10px;text-transform:uppercase;
  letter-spacing:.12em;color:var(--text3);margin-bottom:10px;
}

/* ── STATS BAR ── */
.stat-bar{
  display:flex;justify-content:space-around;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;padding:14px 12px;margin-bottom:12px;
}
.stat-item{text-align:center;}
.stat-val{font-size:26px;font-weight:900;line-height:1;}
.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-top:3px;}

/* ── DAILY CHALLENGE ── */
.daily-card{
  border:2px solid var(--gold);border-radius:14px;
  padding:14px 16px;margin-bottom:12px;cursor:pointer;
  background:rgba(240,184,64,.05);
  transition:transform .12s,background .12s;
}
.daily-card:hover{transform:translateY(-2px);background:rgba(240,184,64,.1);}
.daily-badge{
  display:inline-block;font-size:9px;font-weight:800;
  background:var(--gold);color:#1a0f00;
  border-radius:20px;padding:3px 10px;
  text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px;
}

/* ── SHARE OVERLAY ── */
.share-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:20px;
}
.share-hint{color:#fff;font-size:11px;margin-top:10px;opacity:.65;text-align:center;}

/* ── TOP NAV BAR ── */
.app-top{
  display:flex;justify-content:space-between;align-items:center;
  gap:8px;margin-bottom:12px;
}
.app-brand{display:flex;flex-direction:column;min-width:0;flex:1;}
.app-kicker{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:var(--text3);}
.app-name{font-size:17px;font-weight:900;letter-spacing:-.02em;}
.top-actions{display:flex;gap:6px;align-items:center;}
.icon-btn{
  width:38px;height:38px;
  border:1.5px solid var(--border2);border-radius:10px;
  background:var(--bg2);color:var(--text);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;
  transition:background .12s;-webkit-tap-highlight-color:transparent;
}
.icon-btn:hover{background:var(--bg3);}

/* ── PAUSE SHEET ── */
.sheet-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1100;
  display:flex;align-items:flex-end;justify-content:center;padding:16px;
}
.sheet-card{
  width:100%;max-width:420px;
  background:var(--bg2);border:1.5px solid var(--border2);
  border-radius:22px 22px 16px 16px;
  padding:18px;box-shadow:0 24px 64px rgba(0,0,0,.75);
}
.sheet-head{
  display:flex;justify-content:space-between;
  align-items:flex-start;gap:10px;margin-bottom:14px;
}
.sheet-title{font-size:20px;font-weight:900;}
.sheet-sub{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.5;}
.sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.sheet-grid .btn{margin-bottom:0;}

/* ── SCENARIO LIST ── */
.sc-list{display:grid;gap:10px;margin-top:12px;}
.sc-item{
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:14px;padding:14px;
  transition:border-color .15s;
}
.sc-item:hover{border-color:var(--border2);}
.sc-meta{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:5px;}
.sc-title{font-size:15px;font-weight:800;margin-bottom:5px;}
.sc-sub{font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.5;}
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:999px;
  background:var(--bg3);border:1px solid var(--border2);
  font-size:10px;color:var(--text2);font-weight:500;
}

/* ── TROPHY CABINET ── */
.trophy-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.trophy-card{
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:12px;padding:13px;
  transition:border-color .15s;
}
.trophy-title{font-size:12px;font-weight:700;margin-bottom:5px;line-height:1.3;}
.trophy-state{font-size:10px;color:var(--text2);line-height:1.5;}

/* ── MINI ACTIONS ── */
.mini-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}

/* ── BAT RELEASE CUE ── */
.release-cue{
  position:absolute;left:50%;top:22%;
  transform:translate(-50%,-50%) scale(.92);
  padding:7px 14px;border-radius:999px;
  background:rgba(255,255,255,.97);border:2px solid var(--green);
  font-size:11px;font-weight:900;letter-spacing:.08em;
  color:#002a14;opacity:0;pointer-events:none;
  box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:12;
}
.release-cue.active{animation:releasePulse .7s ease-out forwards;}

/* ── CONFETTI ── */
.confetti-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:2200;}
.confetti-piece{
  position:absolute;top:-12px;width:8px;height:14px;
  border-radius:3px;opacity:.95;
  animation:confettiFall 1.1s ease-out forwards;
}

/* ── BUCKET / DIFFICULTY CARDS ── */
.app-section{margin-top:12px;}
.choice-grid{display:grid;grid-template-columns:1fr;gap:10px;margin:12px 0;}
.choice-card{
  background:var(--bg2);border:2px solid var(--border);
  border-radius:16px;padding:16px 16px 14px;
  cursor:pointer;transition:transform .12s,border-color .15s,background .15s;
}
.choice-card:hover{transform:translateY(-2px);border-color:var(--border2);background:var(--bg3);}
.choice-card:active{transform:scale(.98);}
.choice-kicker{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:5px;}
.choice-title{font-size:18px;font-weight:800;margin-bottom:5px;}
.choice-sub{font-size:12px;color:var(--text2);line-height:1.5;}
.choice-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.pill-bucket{
  display:inline-block;font-size:9px;border-radius:999px;
  padding:3px 10px;background:var(--bg3);border:1px solid var(--border2);
  text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:7px;
}

/* ── LANE AREA BUTTONS ── */
.lane-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px;}
.lane-row .ft{padding:13px 6px;font-size:13px;font-weight:700;}

/* ── SHOT PICK BUTTONS (bat timing) ── */
.shot-picks{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.shot-pick{text-align:center;}
.shot-pick .ft{
  width:100%;padding:14px 6px;font-size:14px;font-weight:800;
  border-width:2px;background:var(--bg2);
}
.shot-pick .sub{font-size:9px;line-height:1.4;color:var(--text3);margin-top:6px;padding:0 4px;}

/* ── PLAYER STRIP ── */
.player-strip{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.player-chip{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;}
.player-chip .k{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:3px;}
.player-chip .v{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── CONTROL METER ── */
.ctrl-meter{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px 8px;margin-bottom:10px;
}
.ctrl-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.ctrl-title{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);}
.ctrl-state{font-size:11px;font-weight:700;color:var(--text);}
.ctrl-track{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:6px;}
.ctrl-seg{height:8px;border-radius:999px;background:var(--border2);}
.ctrl-seg.on{background:var(--blue);}
.ctrl-seg.hot{background:var(--green);}
.ctrl-txt{font-size:10px;line-height:1.5;color:var(--text2);}
.ctrl-note{
  background:var(--blue-bg);border:1px solid rgba(61,142,240,.25);
  border-radius:10px;padding:9px 12px;
  font-size:11px;color:#93c5fd;line-height:1.5;margin-bottom:10px;
}
.diff-badge{
  display:inline-block;font-size:10px;text-transform:uppercase;
  letter-spacing:.09em;padding:4px 10px;border-radius:999px;
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text3);margin-top:10px;font-weight:600;
}

/* ── KEYFRAMES ── */
@keyframes releasePulse{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.82);}
  20%{opacity:1;}
  65%{opacity:1;transform:translate(-50%,-54%) scale(1.03);}
  100%{opacity:0;transform:translate(-50%,-68%) scale(1.08);}
}
@keyframes confettiFall{
  0%{transform:translate3d(0,0,0) rotate(0deg);opacity:1;}
  100%{transform:translate3d(var(--dx),105vh,0) rotate(var(--rot));opacity:0;}
}
@keyframes resultPop{
  0%{transform:scale(.84);opacity:0;}
  65%{transform:scale(1.04);}
  100%{transform:scale(1);opacity:1;}
}
.result-pop{animation:resultPop .32s cubic-bezier(.25,.46,.45,.94) both;}
</style>
</head>
<body>
<div id="g"></div>
<script>
// ===== SCENARIOS (16 total) =====
const SC=[
  // ─ original 6 ─
  {id:'mi_csk',   match:'IPL 2024 — Final',           bt:'Mumbai Indians', bwt:'CSK',              bc:'#004BA0',wc:'#FBCF00',bowl:'pathirana',  need:18,wkts:2,order:['rohit','sky','hardik','iyer_b']},
  {id:'rcb_kkr',  match:'IPL 2024 — Qualifier',        bt:'RCB',            bwt:'KKR',              bc:'#EC1C24',wc:'#3A225D',bowl:'harshit',    need:14,wkts:3,order:['kohli','maxwell_b','faf_b','stoinis']},

  {id:'ind_eng',  match:'T20 WC 2022 — Semi Final',    bt:'India',          bwt:'England',          bc:'#0033A0',wc:'#003399',bowl:'archer',     need:13,wkts:5,order:['rohit','kohli','sky','hardik']},

  {id:'lsg_mi',   match:'IPL 2024 — Match',             bt:'LSG',            bwt:'Mumbai Indians',   bc:'#68B5E8',wc:'#004BA0',bowl:'bumrah',     need:15,wkts:3,order:['kl_b','stoinis','miller','tail_b']},
  // ─ new 10 ─

function batDeliveryPool(bowler){
  const id=Object.keys(BWL).find(k=>BWL[k].n===bowler?.n) || '';
  if(['ashwin','jadeja_bwl','pritam_bwl'].includes(id)) return ['offspin'];
  if(['rashid','viraj_bwl'].includes(id)) return ['legspin'];
  if(['unni_bwl'].includes(id)) return ['chinaman'];
  if(['boult','bhuvi','kavar_bwl'].includes(id)) return ['inswing','outswing'];
  if(['pathirana','malinga'].includes(id)) return ['inswing','bouncer'];
  if(['shaheen','archer','harshit','joginder','stokes_bwl','sagar_bwl','abhishek_bwl','shreeju_bwl'].includes(id)) return ['inswing','outswing','bouncer'];
  if(bowler?.tp==='spinner') return ['offspin','legspin'];
  return ['inswing','outswing','bouncer'];
}
function pickBatDelivery(){
  const pool=batDeliveryPool(G.bowl);
  let choices=pool.slice();
  if(choices.length>1 && G.lastBatDel) choices=choices.filter(d=>d!==G.lastBatDel);
  const did=choices[Math.floor(Math.random()*choices.length)]||pool[0]||'inswing';
  G.lastBatDel=did;
  return DEL_BY_ID[did]||DELS[0];
}

// ===== SEEDED RNG (Xorshift32) =====
function xorRng(seed){
  let s=((seed^(seed>>>16))*0x45d9f3b)>>>0;
  return()=>{s^=s<<13;s^=s>>17;s^=s<<5;return(s>>>0)/4294967296;};
}

function dailyDateStr(){const d=new Date();return`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;}
function getDailyScenario(){
  const seed=parseInt(dailyDateStr(),10);
  const rng=xorRng(seed);
  const idx=Math.floor(rng()*SC.length);
  const mode=rng()>.5?'bat':'bowl';
  return{sc:SC[idx],mode,seed};
}

function assessBatChoice(did,sid,area){
  const base=MATCH[did]?.[sid]||'neutral';
  const ideal={
    inswing:{smash:'leg',ground:'leg',defend:'straight'},
    outswing:{smash:'off',ground:'off',defend:'straight'},
    offspin:{smash:'leg',ground:'leg',defend:'straight'},
    legspin:{smash:'off',ground:'straight',defend:'straight'},
    chinaman:{smash:'off',ground:'straight',defend:'straight'},
    bouncer:{smash:'leg',ground:'off',defend:'straight'}
  };
  let q=base;
  const pref=ideal[did]?.[sid];
  if(pref && area===pref){
    if(q==='neutral') q='good';
    else if(q==='good') q='great';
    else if(q==='bad') q='neutral';
    else if(q==='risky') q='neutral';
  }
  if(did==='inswing' && area==='off'){
    q=sid==='defend'?'neutral':(sid==='ground'?'neutral':'bad');
  }else if(did==='outswing' && area==='leg'){
    q=sid==='defend'?'neutral':'bad';
  }else if(did==='offspin' && area==='off'){
    q=sid==='ground'?'neutral':(sid==='defend'?'good':'risky');
  }else if(did==='legspin' && area==='leg'){
    q=sid==='defend'?'neutral':'bad';
  }else if(did==='chinaman' && area==='leg'){
    q=sid==='defend'?'neutral':'bad';
  }else if(did==='bouncer' && area==='straight'){
    q=sid==='defend'?'great':'risky';
  }
  return q;
}

function batComment(result,shot,area,did,q){
  const zone=areaLabel(area).toLowerCase();
  const dName=(DELS.find(d=>d.id===did)?.n||'delivery').toLowerCase();
  const controlNow=G.control||0;
  if(result==='W'){

  }
  if(result===0){

    return (q==='bad'||q==='risky') ? `Wrong option to the ${zone}. Dot ball.` : `Can't quite beat the ring on the ${zone}.`;
  }
  if(result===1){
    if(shot==='defend') return `Solidly defended and nudged away. Control building → ${controlNow}/3`;
    if(shot==='ground') return `Worked into the gap for 1. Control: ${controlNow}/3`;
    return `Worked into the ${zone} for a single.`;
  }
  if(result===2){
    if(shot==='ground') return `Worked into the gap for 2. Control: ${controlNow}/3`;

  }
  if(result===4){

// ===== OUTCOME CALCULATORS =====
function getBatOuts(sid,did,tq,area){
  const o=BOUTS[sid].map(x=>({...x}));
  const m=(p,mt)=>o.forEach(x=>{if(p(x))x.w=Math.max(1,Math.round(x.w*mt));});
  const q=assessBatChoice(did,sid,area||'straight');
  const diff=currentDiff();
  const control=G.control||0;
  const spam=getPhaseSmashCount();
  if(q==='great'){m(x=>x.r==='W',0.5);m(x=>x.r===4||x.r===6,1.6);}
  else if(q==='bad'){m(x=>x.r==='W',1.7);m(x=>x.r===4||x.r===6,0.55);}
  else if(q==='risky')m(x=>x.r==='W',1.45);
  else if(q==='good')m(x=>x.r==='W',0.72);
  if(tq==='perfect'){m(x=>x.r==='W',0.35);m(x=>x.r===4||x.r===6,1.9);}
  else if(tq==='good'){m(x=>x.r==='W',0.65);m(x=>x.r===4||x.r===6,1.35);}
  else if(tq==='poor'){
    m(x=>x.r==='W',2.1);
    if(sid === 'smash') {
      o.forEach(x=>{if(x.r===6||x.r===4)x.w=0;});
      m(x=>x.r===0,1.6);
    } else {
      m(x=>x.r===4||x.r===6,0.3);
    }
  }
  else if(tq === 'ok') {
    m(x=>x.r===6,0.7);
    m(x=>x.r==='W',1.15);
  }
  const bt=G.bat;
  if(bt.c==='low'){m(x=>x.r==='W',1.5);if(sid==='smash')m(x=>x.r===6,0.3);}
  else if(bt.c==='high'){m(x=>x.r==='W',0.65);m(x=>x.r===4||x.r===6,1.25);}
  if(bt.tp==='power'&&sid==='smash'&&bt.c!=='low')m(x=>x.r===6,1.4);
  if(bt.tp==='accumulator'&&sid==='smash'){m(x=>x.r==='W',1.5);m(x=>x.r===6,0.4);}
  if(bt.tp==='finisher')m(x=>x.r==='W',0.88);
  const bw=G.bowl;
  if(bw.c==='high'){m(x=>x.r==='W',1.4);m(x=>x.r===0,1.3);m(x=>x.r===4||x.r===6,0.8);}
  else if(bw.c==='low'){m(x=>x.r==='W',0.6);m(x=>x.r===4||x.r===6,1.4);}
  if(bw.tp==='death'&&sid==='smash')m(x=>x.r===6,0.72);
  if(G.fmode==='defend')m(x=>x.r===6,0.72);
  else if(G.fmode==='attack'){m(x=>x.r===4||x.r===6,1.2);m(x=>x.r==='W',1.1);}

  if(sid==='smash'){
    if(spam>=1){
      m(x=>x.r==='W',1.22 + spam*0.16);
      m(x=>x.r===6,Math.max(0.45,0.9 - spam*0.16));
      m(x=>x.r===4,Math.max(0.6,0.96 - spam*0.12));
    }
    if(control<=0){m(x=>x.r==='W',1.18);m(x=>x.r===4||x.r===6,0.9);}
    else{m(x=>x.r==='W',Math.max(0.7,1-(control*0.08)));m(x=>x.r===4||x.r===6,1+(control*0.06));}
  }else if(sid==='ground'){
    m(x=>x.r==='W',0.84);
    m(x=>x.r===1||x.r===2,1.18);
    if(control >= 1) m(x=>x.r===4,1.08 + (control * 0.08));
    if(control >= 2) m(x=>x.r==='W',0.78);
    if(control >= 3) m(x=>x.r===4||x.r===2,1.22);
  }else if(sid==='defend'){
    m(x=>x.r==='W',0.72);
    m(x=>x.r===0||x.r===1,1.28);
    m(x=>x.r===4||x.r===6,0.4);
  }

  m(x=>x.r==='W',diff.wkt);
  m(x=>x.r===4||x.r===6,diff.shot);
  return o;
}

function getWOuts(did,btq){
  const o=(WOUTS[did]||WOUTS.fuller).map(x=>({...x}));
  const m=(p,mt)=>o.forEach(x=>{if(p(x))x.w=Math.max(1,Math.round(x.w*mt));});
  if(btq==='perfect'){m(x=>x.r==='W',1.3);m(x=>x.r===0,1.15);m(x=>x.r===4||x.r===6,0.6);}
  else if(btq==='good'){m(x=>x.r==='W',1.12);m(x=>x.r===4||x.r===6,0.85);}
  else if(btq==='poor'){m(x=>x.r==='W',0.55);m(x=>x.r===4||x.r===6,1.8);m(x=>x.r===6,1.4);}
  const bw=G.bowl;
  if(bw.c==='high'){m(x=>x.r==='W',1.38);m(x=>x.r===0,1.2);m(x=>x.r===4||x.r===6,0.82);}
  else if(bw.c==='low'){m(x=>x.r==='W',0.7);m(x=>x.r===4||x.r===6,1.28);}
  if(bw.tp==='death'&&did==='yorker'){m(x=>x.r==='W',1.18);m(x=>x.r===0,1.12);}
  const bt=G.bat;
  if(bt.c==='high'){m(x=>x.r===4||x.r===6,1.28);m(x=>x.r==='W',0.76);}
  else if(bt.c==='low'){m(x=>x.r==='W',1.38);m(x=>x.r===4||x.r===6,0.7);}
  if(bt.tp==='power'&&did==='short')m(x=>x.r===6,1.4);
  if(G.fmode==='attack'){m(x=>x.r==='W',1.22);m(x=>x.r===4||x.r===6,0.92);}
  else m(x=>x.r===4||x.r===6,0.88);
  const diff=currentDiff();
  m(x=>x.r==='W',diff.bowlWkt);
  m(x=>x.r===4||x.r===6,diff.bowlLeak);
  return o;
}

// ===== STATE UPDATE =====
function stateUpd(result){
  const msgs=[];
  if(result==='W'){if(G.bowl.c!=='high')G.bowl.c=G.bowl.c==='low'?'medium':'high';msgs.push(`${G.bowl.s} pumped up.`);}
  else if(result===6){G.bat.c='high';if(G.bowl.c!=='low')G.bowl.c=G.bowl.c==='high'?'medium':'low';msgs.push(`${G.bat.s} is in the zone.`);}
  else if(result===4){if(G.bat.c==='low')G.bat.c='medium';}
  else if(result===0){if(G.bat.c==='high')G.bat.c='medium';else if(G.bat.c==='medium')G.bat.c='low';if(G.bowl.c!=='high')G.bowl.c=G.bowl.c==='low'?'medium':'high';msgs.push(`${G.bowl.s} growing in confidence.`);}
  return msgs.join(' ');
}

// ===== BATTING TIMING =====
function timeoutCurrentTiming(){
  if(!(G&&G.timing))return;
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(autoHitTimer){clearTimeout(autoHitTimer);autoHitTimer=null;}
  const isBowl=G.timing.isBowl;
  clearReleaseCue();
  G.timing.active=false;
  G.timing.paused=false;
  if(isBowl){
    G.btq='poor';
    proceedBowl();
  }else{
    G.tq='poor';
    G.selArea=G.selArea||'straight';
    proceedBat(true);
  }
}
function startTiming(){
  G.timing={active:true,paused:false,isBowl:false,startTs:Date.now(),progressMs:0,remainingMs:5000};
  if(rafId)cancelAnimationFrame(rafId);
  if(autoHitTimer)clearTimeout(autoHitTimer);
  rafLoop(false);
  autoHitTimer=setTimeout(timeoutCurrentTiming,G.timing.remainingMs);
}
function rafLoop(isBowl){
  const c=$('tcursor');if(!c||!(G&&G.timing))return;
  const cfg=getTimingCfg(isBowl?G.selDel:G.selShot,isBowl);
  const spd=cfg.speed;
  const elapsed=(G.timing.progressMs||0)+(Date.now()-G.timing.startTs);
  const cycle=spd*2;
  const loopMs=((elapsed%cycle)+cycle)%cycle;
  const pct=loopMs<spd?85-(loopMs/spd)*72:13+((loopMs-spd)/spd)*72;
  c.style.top=pct+'%';
  rafId=requestAnimationFrame(()=>rafLoop(isBowl));
}
function hitTiming(){
  playBatShot(G.selArea||'straight');
}

function playBatShot(area){
  if(!(G&&G.timing&&G.timing.active))return;
  clearReleaseCue();
  if(autoHitTimer){clearTimeout(autoHitTimer);autoHitTimer=null;}
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(G&&G.timing)G.timing=null;
  G.selArea=area||'straight';
  const c=$('tcursor');
  const top=c?parseFloat(c.style.top):50;
  const dist=Math.abs(top-49);
  const cfg=getTimingCfg(G.selShot,false);
  G.tq=dist<cfg.pD?'perfect':dist<cfg.gD?'good':dist<38?'ok':'poor';
  if(c)c.style.background=G.tq==='perfect'?'#1fc87a':G.tq==='good'?'#93c5fd':G.tq==='poor'?'#e84545':'#f5a820';
  setTimeout(()=>proceedBat(false),220);
}

function proceedBat(fromTimeout=false){
  const sid=G.selShot,did=G.curDel.id,area=G.selArea||'straight';

  const tTag=G.tq==='perfect'?`<span class="timing-tag" style="background:rgba(31,200,122,.16);color:#4ade80;border-color:rgba(31,200,122,.35)">🎯 Perfect!</span>`:G.tq==='good'?`<span class="timing-tag" style="background:rgba(61,142,240,.16);color:#93c5fd;border-color:rgba(61,142,240,.35)">✓ Good timing</span>`:G.tq==='poor'?`<span class="timing-tag" style="background:rgba(232,69,69,.16);color:#f08080;border-color:rgba(232,69,69,.35)">✗ Late / mistimed</span>`:'';
  const qTag=q==='great'?`<span class="timing-tag" style="background:rgba(31,200,122,.12);color:#4ade80;border-color:rgba(31,200,122,.3)">✓ Right matchup</span>`:q==='good'?`<span class="timing-tag" style="background:rgba(52,211,153,.12);color:#6ee7b7;border-color:rgba(52,211,153,.3)">Good option</span>`:q==='bad'?`<span class="timing-tag" style="background:rgba(245,168,32,.12);color:#fcd34d;border-color:rgba(245,168,32,.3)">Wrong option</span>`:q==='risky'?`<span class="timing-tag" style="background:rgba(232,69,69,.12);color:#f08080;border-color:rgba(232,69,69,.3)">Risky choice</span>`:'';

  finish(result,comm,getBatTrajectory(sid,area,did),tTag+' '+qTag+' '+areaTag);
}

function setField(mode){G.fmode=mode;showBowlBall();}

// ── SHARED FLOW ──
function finish(result,comm,tk,extra){
  G.res.push(result);
  const sm=stateUpd(result);
  if(result==='W'){G.wkts--;G.fallen++;}else{G.need-=result;G.scored+=result;}
  G.ball++;
  if(G.need<=0)G.won=G.mode==='bat';
  else if(G.wkts<=0||G.ball>=6)G.won=G.mode==='bowl';
  const isLast=G.need<=0||G.wkts<=0||G.ball>=6;
  // Body flash for impact moments
  if(result===6){document.body.style.background='#0a2818';setTimeout(()=>document.body.style.background='',400);}
  else if(result==='W'){document.body.style.background='#1a0a0a';setTimeout(()=>document.body.style.background='',400);}
  anim(tk,result,()=>showRes(result,comm,sm,extra,isLast,tk));
}

  clearReleaseCue();
  G.screen='ball_result';
  const lbl=result==='W'?'OUT':result===0?'DOT':result===4?'FOUR':result===6?'SIX':String(result);

  const rStyle={
    W:  {bg:'rgba(232,69,69,.15)',  border:'#e84545', col:'#f87171', label:'Wicket!'},

    6:  {bg:'rgba(31,200,122,.18)', border:'#1fc87a', col:'#4ade80', label:'Maximum!'}
  }[result===0?0:result==='W'?'W':result]||{bg:'rgba(74,82,112,.12)',border:'#354060',col:'#8a93ae',label:''};
  const tmap=(typeof tk==='object'&&tk)?tk:(TR[tk]||TR.ground);
  const ep=resultEndpoint(tmap,result,tk);
  const fkey=G.mode==='bowl'?(G.fmode==='attack'?'attack':'defend'):(G.curDel?.id||'full');
  $('g').innerHTML=`${topbarH(true)}${sbarH()}${trH()}
  <div class="field-row">
    <div class="t-bar-wrap">
      <div style="height:250px;background:${rStyle.bg};border-radius:12px;border:1.5px solid ${rStyle.border};display:flex;align-items:center;justify-content:center">
        <div style="font-size:14px;font-weight:900;color:${rStyle.col};text-align:center;padding:6px">${lbl}</div>
      </div>
    </div>
    <div class="field-col">${fw(fkey,null)}</div>
    <div class="shot-info"></div>
  </div>

      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:${rStyle.col};margin-bottom:4px;font-weight:700">${rStyle.label}</div>
      <div class="res-big" style="color:${rStyle.col}">${lbl}</div>
    </div>

    ${extra?`<div style="margin-top:8px">${extra}</div>`:''}

  </div>
  <div style="text-align:center;font-size:12px;color:#4a5270;margin-top:4px">${isLast?'<span style="color:#8a93ae;font-weight:700">Over complete</span>':6-G.ball+' ball'+(6-G.ball!==1?'s':'')+' left'}</div>`;
  sb(ep.x,ep.y,0);
  if(result===4||result===6)launchConfetti(result===6?34:22);
  if(result===6){const fb=$('fball');if(fb)fb.style.opacity='0';}

  else if(result==='W'&&G.wkts>0&&G.batIdx<G.batOrder.length-1)setTimeout(newBat,2050);

function showResult(){
  G.screen='result';
  const won=G.won,isBat=G.mode==='bat';
  saveStats(won,G.isDaily);
  const stats=getStats();
  const streak=stats.str||0;
  const streakFx=streak>3?' 🔥':'';
  const margin=won
    ?(isBat?`${G.sc.bt} win with ${6-G.ball} ball${6-G.ball!==1?'s':''} spare`:`${G.sc.bwt} successfully defended`)
    :(isBat?`${G.sc.bwt} hold on — ${Math.max(0,G.need)} run${G.need!==1?'s':''} short`:`${G.sc.bt} complete the chase`);
  const ds=G.res.map(r=>`<div class="bd ${bc(r)}" style="width:34px;height:34px;font-size:12px">${bl(r)}</div>`).join('');
  const winBg=won?'rgba(31,200,122,.1)':'rgba(232,69,69,.08)';
  const winBorder=won?'rgba(31,200,122,.25)':'rgba(232,69,69,.2)';
  const winColor=won?'#1fc87a':'#e84545';
  const resultLabel=won?(isBat?'Chase complete!':'Defended!'):(isBat?'Chase failed':'Target reached');
  $('g').innerHTML=`${topbarH(false)}
  <div style="background:${winBg};border:1.5px solid ${winBorder};border-radius:16px;padding:24px 16px 18px;text-align:center;margin-bottom:14px" class="result-pop">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:#4a5270;margin-bottom:12px">${G.sc.match}</div>
    <div style="font-size:52px;margin-bottom:12px;line-height:1">${won?'🏆':'💔'}</div>
    <div style="font-size:26px;font-weight:900;color:${winColor};margin-bottom:8px;letter-spacing:-.02em">${resultLabel}</div>
    <div style="font-size:14px;color:#8a93ae;line-height:1.5">${margin}</div>
    ${won?`<div style="margin-top:12px;display:inline-block;padding:6px 16px;border-radius:999px;background:rgba(31,200,122,.15);border:1px solid rgba(31,200,122,.3);font-size:12px;font-weight:800;color:#4ade80">Streak: ${streak}${streakFx}</div>`:''}
  </div>
  <div style="display:flex;gap:6px;justify-content:center;margin:0 0 14px">${ds}</div>
  <div style="background:#161c28;border:1px solid #252e48;border-radius:12px;padding:4px 14px;margin-bottom:14px">
    <div class="st"><span style="color:#8a93ae">Runs ${isBat?'scored':'conceded'}</span><span style="font-weight:800;color:#f0f2f8">${G.scored}</span></div>
    <div class="st"><span style="color:#8a93ae">${isBat?'Wickets fallen':'Wickets taken'}</span><span style="font-weight:800;color:#f0f2f8">${G.fallen}</span></div>
  </div>
  ${won?`<button class="btn btnP" style="margin-bottom:8px" onclick="nextScenario()">Next scenario →</button>`:''}
  <button class="btn" style="margin-bottom:8px" onclick="showShareCard()">📤 Share result card</button>
  <button class="btn ${won?'':'btnP'}" onclick="showModeSelect()">${won?'Back to home':'Play again'}</button>`;
}

// ===== SHARE CARD (Canvas) =====
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function buildShareCanvas(){
  const W=600,H=360;
  const canvas=document.createElement('canvas');
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const won=G.won;

  // Background
  ctx.fillStyle='#f8f7f4';
  roundRect(ctx,0,0,W,H,18);ctx.fill();

  // Header band
  ctx.fillStyle='#1a1a18';
  roundRect(ctx,0,0,W,70,18);ctx.fill();
  ctx.fillRect(0,50,W,20);

  // LAST OVER title
  ctx.fillStyle='#ffffff';
  ctx.font='bold 15px Arial,sans-serif';
  ctx.fillText('LAST OVER',24,38);

  // Daily badge
  if(G.isDaily){
    ctx.fillStyle='#F0B429';
    roundRect(ctx,140,24,104,22,11);ctx.fill();
    ctx.fillStyle='#1a1a18';
    ctx.font='bold 11px Arial,sans-serif';
    ctx.fillText('⬡ DAILY CHALLENGE',148,39);
  }

  // Match name (right-aligned)
  ctx.fillStyle='#8a8a85';
  ctx.font='12px Arial,sans-serif';
  ctx.textAlign='right';
  ctx.fillText(G.sc.match,W-24,38);
  ctx.textAlign='left';

  // Win/loss result
  ctx.font='bold 38px Arial,sans-serif';
  ctx.fillStyle=won?'#0f6e56':'#a32d2d';
  ctx.fillText(won?(G.mode==='bat'?'🏆 Chase Complete!':'🏆 Defended!'):(G.mode==='bat'?'💔 Chase Failed':'💔 Target Reached'),24,120);

  // Match description
  const isBat=G.mode==='bat';
  const margin=won
    ?(isBat?`${G.sc.bt} win with ${6-G.ball} ball${6-G.ball!==1?'s':''} spare`:`${G.sc.bwt} successfully defended`)
    :(isBat?`${G.sc.bwt} hold on — ${Math.max(0,G.need)} run${G.need!==1?'s':''} short`:`${G.sc.bt} complete the chase`);
  ctx.font='14px Arial,sans-serif';
  ctx.fillStyle='#5c5c58';
  ctx.fillText(margin,24,146);

  // Ball-by-ball dots
  const ballColors={W:'#E24B4A',0:'#9a9a90',1:'#0c447c',2:'#27500a',4:'#633806',6:'#085041'};
  const ballBg={W:'#fcebeb',0:'#eeedea',1:'#e6f1fb',2:'#eaf3de',4:'#faeeda',6:'#e1f5ee'};
  const R=22,gapX=14,startX=24,ballY=188;
  G.res.forEach((r,i)=>{
    const x=startX+i*(R*2+gapX);
    ctx.fillStyle=ballBg[r]||'#eee';
    ctx.beginPath();ctx.arc(x+R,ballY,R,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=ballColors[r]||'#ccc';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(x+R,ballY,R,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=ballColors[r]||'#555';
    ctx.font='bold 14px Arial,sans-serif';
    ctx.textAlign='center';
    ctx.fillText(r==='W'?'W':r===0?'·':String(r),x+R,ballY+5);
    ctx.textAlign='left';
  });

  // Stats row
  ctx.fillStyle='#d4d3cf';
  ctx.fillRect(24,232,W-48,1);
  const stats=[
    {l:isBat?'Runs scored':'Runs conceded',v:String(G.scored)},
    {l:isBat?'Wickets fallen':'Wickets taken',v:String(G.fallen)},
    {l:isBat?'Mode':'Mode',v:isBat?'Batting':'Bowling'}
  ];
  stats.forEach((st,i)=>{
    const x=24+i*192;
    ctx.font='11px Arial,sans-serif';ctx.fillStyle='#8a8a85';
    ctx.fillText(st.l,x,260);
    ctx.font='bold 22px Arial,sans-serif';ctx.fillStyle='#1a1a18';
    ctx.fillText(st.v,x,288);
  });

  // Footer
  ctx.fillStyle='#1a1a18';
  ctx.fillRect(0,316,W,44);
  ctx.fillStyle='#ffffff';
  ctx.font='bold 13px Arial,sans-serif';
  ctx.fillText('Last Over · Cricket Tactical Game',24,344);
  ctx.textAlign='right';
  ctx.fillStyle='#8a8a85';
  ctx.font='11px Arial,sans-serif';
  ctx.fillText('#LastOver',W-24,344);
  ctx.textAlign='left';

  return canvas;
}

function showShareCard(){
  const canvas=buildShareCanvas();
  const overlay=document.createElement('div');
  overlay.className='share-overlay';
  const img=document.createElement('img');
  img.src=canvas.toDataURL('image/png');
  img.style.cssText='max-width:100%;max-height:70vh;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);';
  const hint=document.createElement('p');
  hint.className='share-hint';
  hint.textContent='Long-press (mobile) or right-click (desktop) to save image';
  const closeBtn=document.createElement('button');
  closeBtn.textContent='✕ Close';
  closeBtn.style.cssText='margin-top:12px;padding:8px 28px;border:1px solid rgba(255,255,255,.4);background:transparent;color:#fff;border-radius:8px;font-size:13px;cursor:pointer;';
  closeBtn.onclick=()=>overlay.remove();
  // Desktop download button
  const dlBtn=document.createElement('a');
  dlBtn.href=canvas.toDataURL('image/png');
  dlBtn.download='last-over-result.png';
  dlBtn.textContent='⬇ Download';
  dlBtn.style.cssText='display:inline-block;margin-top:8px;padding:8px 24px;background:#fff;color:#1a1a18;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;';
  overlay.appendChild(img);
  overlay.appendChild(hint);
  overlay.appendChild(dlBtn);
  overlay.appendChild(closeBtn);
  overlay.onclick=(e)=>{if(e.target===overlay)overlay.remove();};
  document.body.appendChild(overlay);
}

showModeSelect();
</script>
