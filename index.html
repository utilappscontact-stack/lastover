<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Last Over</title>
<style>
:root{
  --bg:#f8f7f4;--bg2:#eeedea;--bg3:#e4e3e0;
  --text:#1a1a18;--text2:#5c5c58;--text3:#8a8a85;
  --border:#d4d3cf;--border2:#c0bfbb;
  --green:#0f6e56;--red:#a32d2d;--amber:#854f0b;--blue:#0c447c;
  --green-bg:#e1f5ee;--red-bg:#fcebeb;--amber-bg:#faeeda;--blue-bg:#e6f1fb;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:12px 0 40px;}
#g{width:100%;max-width:420px;padding:12px;}
.sbar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;margin-bottom:8px;}
.sn{font-size:28px;font-weight:600;line-height:1;}
.sl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);}
.wr{display:flex;gap:4px;justify-content:flex-end;margin-bottom:3px;}
.wd{width:10px;height:10px;border-radius:50%;}.wd-on{background:#1D9E75;}.wd-off{background:var(--border);}
.btrack{display:flex;gap:5px;margin-bottom:8px;}
.bd{flex:1;aspect-ratio:1;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;}
.bd-e{color:var(--text3);}.bd-W{background:#fcebeb;color:#791f1f;border-color:#f7c1c1;}.bd-0{background:var(--bg2);}.bd-1{background:#e6f1fb;color:#0c447c;border-color:#b5d4f4;}.bd-2{background:#eaf3de;color:#27500a;border-color:#c0dd97;}.bd-4{background:#faeeda;color:#633806;border-color:#fac775;}.bd-6{background:#e1f5ee;color:#085041;border-color:#9fe1cb;}
.del-banner{border-left:3px solid;border-radius:0 8px 8px 0;padding:7px 11px;margin-bottom:8px;background:var(--bg2);}
.del-t{font-size:14px;font-weight:600;margin-bottom:2px;}.del-h{font-size:11px;color:var(--text2);}
.field-row{display:flex;gap:6px;align-items:flex-start;margin-bottom:8px;}
.t-bar-wrap{width:28px;flex-shrink:0;}
.t-bar{position:relative;border-radius:14px;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.tz{width:100%;}
.tz-r{background:#E24B4A;}.tz-y{background:#BA7517;}.tz-g{background:#1D9E75;}
.t-cursor{position:absolute;left:0;right:0;height:7px;background:#fff;border-radius:4px;top:85%;box-shadow:0 0 6px rgba(0,0,0,.35);transition:none;}
.t-label{font-size:8px;color:var(--text3);text-align:center;margin-top:4px;line-height:1.4;}
.field-col{flex:1;min-width:0;position:relative;}
.fwrap{position:relative;width:100%;}
#fball{position:absolute;width:12px;height:12px;border-radius:50%;background:#C41E3A;border:1.5px solid #8B0000;transform:translate(-50%,-50%);z-index:10;pointer-events:none;transition:none;}
.shot-info{width:28px;flex-shrink:0;text-align:center;padding-top:65px;}
.si-icon{font-size:16px;margin-bottom:3px;}.si-n{font-size:8px;font-weight:600;}
.hit-btn{display:block;width:100%;padding:14px;font-size:18px;font-weight:700;background:var(--text);color:var(--bg);border:none;border-radius:10px;cursor:pointer;margin-bottom:8px;letter-spacing:.05em;-webkit-tap-highlight-color:transparent;}
.hit-btn:active{transform:scale(.97);}
.timing-tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:10px;margin:3px 2px 0;font-weight:500;}
.cstrip{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px;}
.cc{background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;padding:8px 10px;}
.cc-r{font-size:10px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.cc-n{font-size:13px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cdots{display:flex;gap:3px;align-items:center;}.cd{width:7px;height:7px;border-radius:50%;}.cd-on{background:var(--text);}.cd-off{background:var(--border);}
.cd-l{font-size:9px;color:var(--text2);margin-left:3px;}
.shots{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:8px;}
.shot{border:1.5px solid;border-radius:10px;padding:12px 6px 10px;cursor:pointer;text-align:center;background:#fff;transition:transform .12s;}
.shot:hover{transform:translateY(-2px);}.shot:active{transform:scale(.97);}
.shot:disabled,.shot.disabled{opacity:.3;cursor:not-allowed;transform:none;}
.sd{font-size:12px;font-weight:600;margin-bottom:2px;}.sn2{font-size:11px;margin-bottom:3px;}.sdesc{font-size:9px;color:var(--text2);line-height:1.3;}
.ft-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px;}
.ft{border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;text-align:center;font-size:13px;font-weight:600;background:transparent;color:var(--text);transition:all .15s;}
.ft.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.res-a{text-align:center;padding:12px 0 8px;}
.res-big{font-size:54px;font-weight:700;line-height:1;}
.res-comm{font-size:13px;color:var(--text2);margin-top:6px;line-height:1.55;max-width:270px;margin-left:auto;margin-right:auto;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0;}
.mc{border:1.5px solid var(--border);border-radius:12px;padding:18px 12px;cursor:pointer;text-align:center;transition:transform .12s,border-color .15s;background:#fff;}
.mc:hover{transform:translateY(-3px);border-color:var(--text);}
.mc-i{font-size:32px;margin-bottom:7px;}.mc-n{font-size:17px;font-weight:700;margin-bottom:4px;}.mc-d{font-size:11px;color:var(--text2);line-height:1.4;}
.sc-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.btn{display:block;width:100%;padding:12px;font-size:14px;font-weight:600;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text);cursor:pointer;margin-bottom:8px;text-align:center;}
.btn:hover{background:var(--bg2);}
.btnP{background:var(--text);color:var(--bg);border-color:var(--text);}
.btnP:hover{opacity:.88;}
.st{display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
.st:last-child{border:none;}
.new-bat-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;padding:14px;text-align:center;margin-bottom:10px;}
.match-hdr{text-align:center;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:8px;}
/* ─── NEW CLASSES ─── */
.stat-bar{display:flex;justify-content:space-around;background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px;}
.stat-item{text-align:center;}
.stat-val{font-size:20px;font-weight:700;line-height:1;}
.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-top:2px;}
.daily-card{border:2px solid var(--text);border-radius:10px;padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:transform .12s;}
.daily-card:hover{transform:translateY(-2px);}
.daily-badge{display:inline-block;font-size:9px;background:var(--text);color:var(--bg);border-radius:20px;padding:2px 8px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.bowl-timing-lbl{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:7px;color:var(--text3);}
.share-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.share-hint{color:#fff;font-size:11px;margin-top:10px;opacity:.7;text-align:center;}

.app-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px;}
.app-brand{display:flex;flex-direction:column;min-width:0;flex:1;}
.app-kicker{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);}
.app-name{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top-actions{display:flex;gap:6px;align-items:center;}
.icon-btn{width:38px;height:38px;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;}
.icon-btn:hover{background:var(--bg2);}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.46);z-index:1100;display:flex;align-items:flex-end;justify-content:center;padding:16px;}
.sheet-card{width:100%;max-width:420px;background:var(--bg);border:1px solid var(--border);border-radius:18px 18px 14px 14px;padding:14px;box-shadow:0 16px 48px rgba(0,0,0,.28);}
.sheet-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;}
.sheet-title{font-size:18px;font-weight:700;}
.sheet-sub{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.45;}
.sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.sheet-grid .btn{margin-bottom:0;}
.sc-list{display:grid;gap:8px;margin-top:12px;}
.sc-item{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:12px;}
.sc-meta{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:5px;}
.sc-title{font-size:14px;font-weight:700;margin-bottom:6px;}
.sc-sub{font-size:11px;color:var(--text2);margin-bottom:10px;}
.pill-row{display:flex;gap:6px;flex-wrap:wrap;}
.pill{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:999px;background:#fff;border:1px solid var(--border);font-size:10px;color:var(--text2);}
.trophy-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.trophy-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:12px;}
.trophy-title{font-size:13px;font-weight:700;margin-bottom:5px;}
.trophy-state{font-size:11px;color:var(--text2);line-height:1.45;}
.mini-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px;}
.release-cue{position:absolute;left:50%;top:22%;transform:translate(-50%,-50%) scale(.92);padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.94);border:1px solid var(--border);font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--text2);opacity:0;pointer-events:none;box-shadow:0 8px 18px rgba(0,0,0,.08);z-index:12;}
.release-cue.active{animation:releasePulse .7s ease-out forwards;}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:2200;}
.confetti-piece{position:absolute;top:-12px;width:8px;height:14px;border-radius:3px;opacity:.95;animation:confettiFall 1s ease-out forwards;}
@keyframes releasePulse{0%{opacity:0;transform:translate(-50%,-50%) scale(.82);}20%{opacity:1;}65%{opacity:1;transform:translate(-50%,-54%) scale(1.03);}100%{opacity:0;transform:translate(-50%,-68%) scale(1.08);}}
@keyframes confettiFall{0%{transform:translate3d(0,0,0) rotate(0deg);opacity:1;}100%{transform:translate3d(var(--dx),105vh,0) rotate(var(--rot));opacity:0;}}


.app-section{margin-top:10px;}
.choice-grid{display:grid;grid-template-columns:1fr;gap:10px;margin:12px 0;}
.choice-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:14px 14px 12px;cursor:pointer;transition:transform .12s,border-color .15s;}
.choice-card:hover{transform:translateY(-2px);border-color:var(--text);}
.choice-kicker{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:4px;}
.choice-title{font-size:17px;font-weight:700;margin-bottom:4px;}
.choice-sub{font-size:12px;color:var(--text2);line-height:1.45;}
.choice-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.pill-bucket{display:inline-block;font-size:9px;border-radius:999px;padding:3px 8px;background:var(--bg2);border:0.5px solid var(--border);text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:6px;}
.lane-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:8px;}
.lane-row .ft{padding:10px 6px;font-size:12px;}
.ctrl-note{background:var(--blue-bg);border:0.5px solid #b5d4f4;border-radius:10px;padding:9px 10px;font-size:11px;color:#0c447c;line-height:1.45;margin-bottom:8px;}
.diff-badge{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;padding:4px 8px;border-radius:999px;background:var(--bg2);border:0.5px solid var(--border);color:var(--text2);margin-top:8px;}

</style>
</head>

  if(sc?.bucket)return sc.bucket;

function getBucketLabel(bucket){

// ===== SEEDED RNG (Xorshift32) =====
function xorRng(seed){
  let s=((seed^(seed>>>16))*0x45d9f3b)>>>0;
  return()=>{s^=s<<13;s^=s>>17;s^=s<<5;return(s>>>0)/4294967296;};
}

function dailyDateStr(){const d=new Date();return`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;}
function getDailyScenario(){
  const seed=parseInt(dailyDateStr(),10);
  const rng=xorRng(seed);
  const idx=Math.floor(rng()*SC.length);
  const mode=rng()>.5?'bat':'bowl';
  return{sc:SC[idx],mode,seed};
}

function saveStats(won,isDaily){
  const s=getStats();
  s.p++;
  if(won){
    s.w++;s.str++;s.max=Math.max(s.max,s.str);
    if(G.mode==='bat')s.batWins++;else s.bowlWins++;
    if(isDaily)s.dailyWins++;
    const key=G.sc?.id;

      s.scenarios[key][G.mode]=(s.scenarios[key][G.mode]||0)+1;

function assessBatChoice(did,sid,area){
  const base=MATCH[did]?.[sid]||'neutral';
  const ideal={
    inswing:{smash:'leg',ground:'leg',defend:'straight'},
    outswing:{smash:'off',ground:'off',defend:'straight'},
    offspin:{smash:'leg',ground:'leg',defend:'straight'},
    legspin:{smash:'off',ground:'straight',defend:'straight'},
    chinaman:{smash:'off',ground:'straight',defend:'straight'},
    bouncer:{smash:'leg',ground:'off',defend:'straight'}
  };
  let q=base;
  const pref=ideal[did]?.[sid];
  if(pref && area===pref){
    if(q==='neutral') q='good';
    else if(q==='good') q='great';
    else if(q==='bad') q='neutral';
    else if(q==='risky') q='neutral';
  }
  if(did==='inswing' && area==='off'){
    q=sid==='defend'?'neutral':(sid==='ground'?'neutral':'bad');
  }else if(did==='outswing' && area==='leg'){
    q=sid==='defend'?'neutral':'bad';
  }else if(did==='offspin' && area==='off'){
    q=sid==='ground'?'neutral':(sid==='defend'?'good':'risky');
  }else if(did==='legspin' && area==='leg'){
    q=sid==='defend'?'neutral':'bad';
  }else if(did==='chinaman' && area==='leg'){
    q=sid==='defend'?'neutral':'bad';
  }else if(did==='bouncer' && area==='straight'){
    q=sid==='defend'?'great':'risky';
  }
  return q;
}

function getBatOuts(sid,did,tq,area){
  const o=BOUTS[sid].map(x=>({...x}));
  const m=(p,mt)=>o.forEach(x=>{if(p(x))x.w=Math.max(1,Math.round(x.w*mt));});
  const q=assessBatChoice(did,sid,area||'straight');
  const diff=currentDiff();
  const control=G.control||0;
  const spam=getPhaseSmashCount();
  if(q==='great'){m(x=>x.r==='W',0.5);m(x=>x.r===4||x.r===6,1.6);}
  else if(q==='bad'){m(x=>x.r==='W',1.7);m(x=>x.r===4||x.r===6,0.55);}
  else if(q==='risky')m(x=>x.r==='W',1.45);
  else if(q==='good')m(x=>x.r==='W',0.72);
  if(tq==='perfect'){m(x=>x.r==='W',0.35);m(x=>x.r===4||x.r===6,1.9);}
  else if(tq==='good'){m(x=>x.r==='W',0.65);m(x=>x.r===4||x.r===6,1.35);}
  else if(tq==='poor'){m(x=>x.r==='W',2.1);m(x=>x.r===4||x.r===6,0.38);m(x=>x.r===6,0.18);}
  const bt=G.bat;
  if(bt.c==='low'){m(x=>x.r==='W',1.5);if(sid==='smash')m(x=>x.r===6,0.3);}
  else if(bt.c==='high'){m(x=>x.r==='W',0.65);m(x=>x.r===4||x.r===6,1.25);}
  if(bt.tp==='power'&&sid==='smash'&&bt.c!=='low')m(x=>x.r===6,1.4);
  if(bt.tp==='accumulator'&&sid==='smash'){m(x=>x.r==='W',1.5);m(x=>x.r===6,0.4);}
  if(bt.tp==='finisher')m(x=>x.r==='W',0.88);
  const bw=G.bowl;
  if(bw.c==='high'){m(x=>x.r==='W',1.4);m(x=>x.r===0,1.3);m(x=>x.r===4||x.r===6,0.8);}
  else if(bw.c==='low'){m(x=>x.r==='W',0.6);m(x=>x.r===4||x.r===6,1.4);}
  if(bw.tp==='death'&&sid==='smash')m(x=>x.r===6,0.72);
  if(G.fmode==='defend')m(x=>x.r===6,0.72);
  else if(G.fmode==='attack'){m(x=>x.r===4||x.r===6,1.2);m(x=>x.r==='W',1.1);}

  if(sid==='smash'){
    if(spam>=1){
      m(x=>x.r==='W',1.22 + spam*0.16);
      m(x=>x.r===6,Math.max(0.45,0.9 - spam*0.16));
      m(x=>x.r===4,Math.max(0.6,0.96 - spam*0.12));
    }
    if(control<=0){m(x=>x.r==='W',1.18);m(x=>x.r===4||x.r===6,0.9);}
    else{m(x=>x.r==='W',Math.max(0.7,1-(control*0.08)));m(x=>x.r===4||x.r===6,1+(control*0.06));}
  }else if(sid==='ground'){
    m(x=>x.r==='W',0.84);
    m(x=>x.r===1||x.r===2,1.18);
    if(control>0)m(x=>x.r===4,1.08);
  }else if(sid==='defend'){
    m(x=>x.r==='W',0.72);
    m(x=>x.r===0||x.r===1,1.28);
    m(x=>x.r===4||x.r===6,0.4);
  }

  m(x=>x.r==='W',diff.wkt);
  m(x=>x.r===4||x.r===6,diff.shot);
  return o;
}

function getWOuts(did,btq){
  const o=(WOUTS[did]||WOUTS.fuller).map(x=>({...x}));
  const m=(p,mt)=>o.forEach(x=>{if(p(x))x.w=Math.max(1,Math.round(x.w*mt));});
  if(btq==='perfect'){m(x=>x.r==='W',1.3);m(x=>x.r===0,1.15);m(x=>x.r===4||x.r===6,0.6);}
  else if(btq==='good'){m(x=>x.r==='W',1.12);m(x=>x.r===4||x.r===6,0.85);}
  else if(btq==='poor'){m(x=>x.r==='W',0.55);m(x=>x.r===4||x.r===6,1.8);m(x=>x.r===6,1.4);}
  const bw=G.bowl;
  if(bw.c==='high'){m(x=>x.r==='W',1.38);m(x=>x.r===0,1.2);m(x=>x.r===4||x.r===6,0.82);}
  else if(bw.c==='low'){m(x=>x.r==='W',0.7);m(x=>x.r===4||x.r===6,1.28);}
  if(bw.tp==='death'&&did==='yorker'){m(x=>x.r==='W',1.18);m(x=>x.r===0,1.12);}
  const bt=G.bat;
  if(bt.c==='high'){m(x=>x.r===4||x.r===6,1.28);m(x=>x.r==='W',0.76);}
  else if(bt.c==='low'){m(x=>x.r==='W',1.38);m(x=>x.r===4||x.r===6,0.7);}
  if(bt.tp==='power'&&did==='short')m(x=>x.r===6,1.4);
  if(G.fmode==='attack'){m(x=>x.r==='W',1.22);m(x=>x.r===4||x.r===6,0.92);}
  else m(x=>x.r===4||x.r===6,0.88);
  const diff=currentDiff();
  m(x=>x.r==='W',diff.bowlWkt);
  m(x=>x.r===4||x.r===6,diff.bowlLeak);
  return o;
}

function stateUpd(result){
  const msgs=[];
  if(result==='W'){if(G.bowl.c!=='high')G.bowl.c=G.bowl.c==='low'?'medium':'high';msgs.push(`${G.bowl.s} pumped up.`);}
  else if(result===6){G.bat.c='high';if(G.bowl.c!=='low')G.bowl.c=G.bowl.c==='high'?'medium':'low';msgs.push(`${G.bat.s} is in the zone.`);}
  else if(result===4){if(G.bat.c==='low')G.bat.c='medium';}

  return msgs.join(' ');
}

function init(mode,scenarioId=null,diff='classic'){
  startRound(mode,scenarioId,diff,false);
}

function startRound(mode,scenarioId=null,diff='classic',isDaily=false){
  const source=scenarioId?SC.find(x=>x.id===scenarioId):SC[Math.floor(Math.random()*SC.length)];
  const s=source||SC[0];
  const order=[...s.order];
  const bucket=getScenarioBucket(s);
  G={mode,sc:s,bat:{...BAT[order[0]]},bowl:{...BWL[s.bowl]},
     need:s.need,wkts:s.wkts,ball:0,scored:0,fallen:0,res:[],batOrder:order,batIdx:0,won:false,
     selShot:null,selArea:null,selDel:null,tq:'ok',btq:'ok',fmode:'defend',curDel:null,
     budget:{yorker:yorkerBudgetForDiff(diff),fuller:6,short:2},isDaily:isDaily,
     smashEarly:0,smashLate:0,timing:null,screen:'preview',diff:diff,control:0,bucket:bucket};
  showSc();
}

function proceedBat(fromTimeout=false){
  const sid=G.selShot,did=G.curDel.id,area=G.selArea||'straight';
  if(sid==='smash')registerSmashUse();
  const q=assessBatChoice(did,sid,area);
  const result=wt(getBatOuts(sid,did,G.tq,area));
  let comm=batComment(result,sid,area,did,q);
  if(fromTimeout) comm='Too late to choose a lane. The bat comes down straight and the chance is gone.';
  const tTag=G.tq==='perfect'?`<span class="timing-tag" style="background:#e1f5ee;color:#085041">🎯 Perfect timing!</span>`:G.tq==='good'?`<span class="timing-tag" style="background:#eaf3de;color:#27500a">✓ Good timing</span>`:G.tq==='poor'?`<span class="timing-tag" style="background:#fcebeb;color:#791f1f">✗ Late / mistimed</span>`:'';
  const qTag=q==='great'?`<span class="timing-tag" style="background:#e6f1fb;color:#0c447c">✓ Right matchup</span>`:q==='good'?`<span class="timing-tag" style="background:#eaf3de;color:#27500a">Good option</span>`:q==='bad'?`<span class="timing-tag" style="background:#faeeda;color:#633806">Wrong option</span>`:q==='risky'?`<span class="timing-tag" style="background:#fcebeb;color:#791f1f">Risky choice</span>`:'';
  const areaTag=`<span class="timing-tag" style="background:#eeedea;color:#1a1a18">${areaIcon(area)} ${areaLabel(area)}</span>`;
  finish(result,comm,getBatTrajectory(sid,area,did),tTag+' '+qTag+' '+areaTag);
}

function proceedBowl(){
  const did=G.selDel;
  G.budget[did]--;
  const result=wt(getWOuts(did,G.btq));
  let comm=pick((WCOMM[did]||{})[result==='W'?'W':result]||[]);
  comm=comm.replace(/{bowl}/g,G.bowl.s);
  const tk=did==='short'?'sa':did==='yorker'?'ya':'fa';
  const btTag=G.btq==='perfect'?`<span class="timing-tag" style="background:#e1f5ee;color:#085041">🎯 Perfect delivery!</span>`:G.btq==='good'?`<span class="timing-tag" style="background:#eaf3de;color:#27500a">✓ Good delivery</span>`:G.btq==='poor'?`<span class="timing-tag" style="background:#fcebeb;color:#791f1f">✗ Wayward!</span>`:'';
  finish(result,comm,tk,btTag);
}

function setField(mode){G.fmode=mode;showBowlBall();}

// ── SHARED FLOW ──
function finish(result,comm,tk,extra){
  G.res.push(result);
  const sm=stateUpd(result);
  if(result==='W'){G.wkts--;G.fallen++;}else{G.need-=result;G.scored+=result;}
  G.ball++;
  if(G.need<=0)G.won=G.mode==='bat';
  else if(G.wkts<=0||G.ball>=6)G.won=G.mode==='bowl';
  const isLast=G.need<=0||G.wkts<=0||G.ball>=6;
  anim(tk,result,()=>showRes(result,comm,sm,extra,isLast,tk));
}

function showRes(result,comm,sm,extra,isLast,tk){
  clearReleaseCue();
  G.screen='ball_result';
  const lbl=result==='W'?'OUT':result===0?'DOT':result===4?'FOUR':result===6?'SIX':String(result);
  const col=result==='W'?'#E24B4A':result===0?'#5c5c58':result===6?'#085041':result===4?'#633806':result===2?'#27500a':'#1a1a18';
  const tmap=(typeof tk==='object'&&tk)?tk:(TR[tk]||TR.ground);
  const ep=resultEndpoint(tmap,result);
  const fkey=G.mode==='bowl'?(G.fmode==='attack'?'attack':'defend'):(G.curDel?.id||'full');
  $('g').innerHTML=`${topbarH(true)}${sbarH()}${trH()}<div class="field-row"><div class="t-bar-wrap"><div style="height:250px;background:#eeedea;border-radius:14px;border:0.5px solid #d4d3cf;display:flex;align-items:center;justify-content:center"><div style="font-size:12px;font-weight:700;color:${col};text-align:center">${lbl}</div></div></div><div class="field-col">${fw(fkey,null)}</div><div class="shot-info"></div></div><div class="res-a"><div class="res-big" style="color:${col}">${lbl}</div><div class="res-comm">${comm}</div>${extra?`<div style="margin-top:6px">${extra}</div>`:''}${sm?`<div style="font-size:11px;color:#5c5c58;margin-top:4px;font-style:italic">${sm}</div>`:''}</div><div style="text-align:center;font-size:12px;color:#8a8a85">${isLast?'Over complete...':6-G.ball+' ball'+(6-G.ball!==1?'s':'')+' left'}</div>`;
  sb(ep.x,ep.y,0);
  if(result===4||result===6)launchConfetti(result===6?34:22);
  if(result===6){const fb=$('fball');if(fb)fb.style.opacity='0';}
  if(isLast)setTimeout(showResult,2150);
  else if(result==='W'&&G.wkts>0&&G.batIdx<G.batOrder.length-1)setTimeout(newBat,2050);
  else setTimeout(showBall,2200);
}

function newBat(){
  G.screen='new_bat';
  G.batIdx++;
  const nb={...BAT[G.batOrder[G.batIdx]]};G.bat=nb;
  const fkey=G.mode==='bowl'?(G.fmode==='attack'?'attack':'defend'):(G.curDel?.id||'full');
  $('g').innerHTML=`${topbarH(true)}${sbarH()}${trH()}<div class="field-row"><div class="t-bar-wrap"><div style="height:250px;background:#eeedea;border-radius:14px;border:0.5px solid #d4d3cf;"></div></div><div class="field-col">${fw(fkey,null)}</div><div class="shot-info"></div></div><div class="new-bat-card"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#5c5c58;margin-bottom:5px">New Batsman In</div><div style="font-size:22px;font-weight:700;margin-bottom:3px">${nb.n}</div><div style="font-size:12px;color:#5c5c58;margin-bottom:7px">${nb.tl} · ${nb.tr}</div>${cdots(nb.c)}</div><div style="text-align:center;font-size:12px;color:#8a8a85">${6-G.ball} ball${6-G.ball!==1?'s':''} remaining</div>`;
  setTimeout(showBall,2000);
}

function showResult(){
  G.screen='result';
  const won=G.won,isBat=G.mode==='bat';
  saveStats(won,G.isDaily);
  const stats=getStats();
  const streak=stats.str||0;
  const streakFx=streak>3?' 🔥':'';
  const margin=won
    ?(isBat?`${G.sc.bt} win with ${6-G.ball} ball${6-G.ball!==1?'s':''} spare`:`${G.sc.bwt} successfully defended`)
    :(isBat?`${G.sc.bwt} hold on — ${Math.max(0,G.need)} run${G.need!==1?'s':''} short`:`${G.sc.bt} complete the chase`);
  const ds=G.res.map(r=>`<div class="bd ${bc(r)}" style="width:32px;height:32px;">${bl(r)}</div>`).join('');
  $('g').innerHTML=`${topbarH(false)}<div style="text-align:center;padding:16px 0 12px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:#8a8a85;margin-bottom:6px">${G.sc.match}</div><div style="font-size:42px;margin-bottom:10px">${won?'🏆':'💔'}</div><div style="font-size:22px;font-weight:700;margin-bottom:5px">${won?(isBat?'Chase complete!':'Defended!'):(isBat?'Chase failed':'Target reached')}</div><div style="font-size:14px;color:#5c5c58">${margin}</div>${won?`<div style="margin-top:10px;display:inline-block;padding:6px 12px;border-radius:999px;background:#eeedea;border:0.5px solid #d4d3cf;font-size:12px;font-weight:700;color:#1a1a18">Current streak: ${streak}${streakFx}</div>`:''}</div><div style="display:flex;gap:5px;justify-content:center;margin:12px 0 16px">${ds}</div><div style="border-top:0.5px solid #d4d3cf;padding:10px 0 4px"><div class="st"><span>Runs ${isBat?'scored':'conceded'}</span><span style="font-weight:600">${G.scored}</span></div><div class="st"><span>${isBat?'Wickets fallen':'Wickets taken'}</span><span style="font-weight:600">${G.fallen}</span></div></div>${won?`<button class="btn btnP" style="margin-top:10px" onclick="nextScenario()">Next scenario →</button>`:''}<button class="btn" style="margin-top:${won?'8px':'10px'}" onclick="showShareCard()">📤 Share result card</button><button class="btn ${won?'':'btnP'}" style="margin-top:4px" onclick="showModeSelect()">${won?'Back to home':'Play again'}</button>`;
}

// ===== SHARE CARD (Canvas) =====
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function buildShareCanvas(){
  const W=600,H=360;
  const canvas=document.createElement('canvas');
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const won=G.won;

  // Background
  ctx.fillStyle='#f8f7f4';
  roundRect(ctx,0,0,W,H,18);ctx.fill();

  // Header band
  ctx.fillStyle='#1a1a18';
  roundRect(ctx,0,0,W,70,18);ctx.fill();
  ctx.fillRect(0,50,W,20);

  // LAST OVER title
  ctx.fillStyle='#ffffff';
  ctx.font='bold 15px Arial,sans-serif';
  ctx.fillText('LAST OVER',24,38);

  // Daily badge
  if(G.isDaily){
    ctx.fillStyle='#F0B429';
    roundRect(ctx,140,24,104,22,11);ctx.fill();
    ctx.fillStyle='#1a1a18';
    ctx.font='bold 11px Arial,sans-serif';
    ctx.fillText('⬡ DAILY CHALLENGE',148,39);
  }

  // Match name (right-aligned)
  ctx.fillStyle='#8a8a85';
  ctx.font='12px Arial,sans-serif';
  ctx.textAlign='right';
  ctx.fillText(G.sc.match,W-24,38);
  ctx.textAlign='left';

  // Win/loss result
  ctx.font='bold 38px Arial,sans-serif';
  ctx.fillStyle=won?'#0f6e56':'#a32d2d';
  ctx.fillText(won?(G.mode==='bat'?'🏆 Chase Complete!':'🏆 Defended!'):(G.mode==='bat'?'💔 Chase Failed':'💔 Target Reached'),24,120);

  // Match description
  const isBat=G.mode==='bat';
  const margin=won
    ?(isBat?`${G.sc.bt} win with ${6-G.ball} ball${6-G.ball!==1?'s':''} spare`:`${G.sc.bwt} successfully defended`)
    :(isBat?`${G.sc.bwt} hold on — ${Math.max(0,G.need)} run${G.need!==1?'s':''} short`:`${G.sc.bt} complete the chase`);
  ctx.font='14px Arial,sans-serif';
  ctx.fillStyle='#5c5c58';
  ctx.fillText(margin,24,146);

  // Ball-by-ball dots
  const ballColors={W:'#E24B4A',0:'#9a9a90',1:'#0c447c',2:'#27500a',4:'#633806',6:'#085041'};
  const ballBg={W:'#fcebeb',0:'#eeedea',1:'#e6f1fb',2:'#eaf3de',4:'#faeeda',6:'#e1f5ee'};
  const R=22,gapX=14,startX=24,ballY=188;
  G.res.forEach((r,i)=>{
    const x=startX+i*(R*2+gapX);
    ctx.fillStyle=ballBg[r]||'#eee';
    ctx.beginPath();ctx.arc(x+R,ballY,R,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=ballColors[r]||'#ccc';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(x+R,ballY,R,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=ballColors[r]||'#555';
    ctx.font='bold 14px Arial,sans-serif';
    ctx.textAlign='center';
    ctx.fillText(r==='W'?'W':r===0?'·':String(r),x+R,ballY+5);
    ctx.textAlign='left';
  });

  // Stats row
  ctx.fillStyle='#d4d3cf';
  ctx.fillRect(24,232,W-48,1);
  const stats=[
    {l:isBat?'Runs scored':'Runs conceded',v:String(G.scored)},
    {l:isBat?'Wickets fallen':'Wickets taken',v:String(G.fallen)},
    {l:isBat?'Mode':'Mode',v:isBat?'Batting':'Bowling'}
  ];
  stats.forEach((st,i)=>{
    const x=24+i*192;
    ctx.font='11px Arial,sans-serif';ctx.fillStyle='#8a8a85';
    ctx.fillText(st.l,x,260);
    ctx.font='bold 22px Arial,sans-serif';ctx.fillStyle='#1a1a18';
    ctx.fillText(st.v,x,288);
  });

  // Footer
  ctx.fillStyle='#1a1a18';
  ctx.fillRect(0,316,W,44);
  ctx.fillStyle='#ffffff';
  ctx.font='bold 13px Arial,sans-serif';
  ctx.fillText('Last Over · Cricket Tactical Game',24,344);
  ctx.textAlign='right';
  ctx.fillStyle='#8a8a85';
  ctx.font='11px Arial,sans-serif';
  ctx.fillText('#LastOver',W-24,344);
  ctx.textAlign='left';

  return canvas;
}

function showShareCard(){
  const canvas=buildShareCanvas();
  const overlay=document.createElement('div');
  overlay.className='share-overlay';
  const img=document.createElement('img');
  img.src=canvas.toDataURL('image/png');
  img.style.cssText='max-width:100%;max-height:70vh;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);';
  const hint=document.createElement('p');
  hint.className='share-hint';
  hint.textContent='Long-press (mobile) or right-click (desktop) to save image';
  const closeBtn=document.createElement('button');
  closeBtn.textContent='✕ Close';
  closeBtn.style.cssText='margin-top:12px;padding:8px 28px;border:1px solid rgba(255,255,255,.4);background:transparent;color:#fff;border-radius:8px;font-size:13px;cursor:pointer;';
  closeBtn.onclick=()=>overlay.remove();
  // Desktop download button
  const dlBtn=document.createElement('a');
  dlBtn.href=canvas.toDataURL('image/png');
  dlBtn.download='last-over-result.png';
  dlBtn.textContent='⬇ Download';
  dlBtn.style.cssText='display:inline-block;margin-top:8px;padding:8px 24px;background:#fff;color:#1a1a18;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;';
  overlay.appendChild(img);
  overlay.appendChild(hint);
  overlay.appendChild(dlBtn);
  overlay.appendChild(closeBtn);
  overlay.onclick=(e)=>{if(e.target===overlay)overlay.remove();};
  document.body.appendChild(overlay);
}

showModeSelect();
</script>
